        .save-btn {

        }

        .cancel-btn {

            color: white;
        }
    </style>
</head>

    // ========== ЗВУК УВЕДОМЛЕНИЯ ==========
    function initNotificationSound() {
        try {
            // Создаём звук через Web Audio API для более надёжного воспроизведения
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
                const audioCtx = new AudioContext();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                notificationSound = {
                    play: () => {
                        if (audioCtx.state === 'suspended') {
                            audioCtx.resume();
                        }
                        const now = audioCtx.currentTime;
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.frequency.value = 800;
                        gain.gain.value = 0.3;
                        osc.start();
                        gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.5);
                        osc.stop(now + 0.5);
                    }
                };
            } else {
                // Fallback: простое beep
                notificationSound = {
                    play: () => {
                        console.log('🔔 Новое сообщение!');
                    }
                };
            }
        } catch(e) {
            console.log('Звук не поддерживается');
            notificationSound = { play: () => {} };
        }
    }

    function playNotificationSound() {
        if (notificationSound && !isPageActive) {
            notificationSound.play();
        }
    }

    // ========== УВЕДОМЛЕНИЯ ==========
    function showNotification(title, message, senderLogin = null) {
        // Показываем тост-уведомление
        const toast = document.createElement('div');
        toast.className = 'notification-toast';
        toast.innerHTML = `
            <div class="notification-title">${title}</div>
            <div class="notification-message">${escapeHtml(message)}</div>
        `;
        
        if (senderLogin) {
            toast.onclick = () => {
                if (senderLogin) {
                    openChatWith(senderLogin);
                    closeSidebar();
                }
                toast.remove();
            };
        }
        
        document.body.appendChild(toast);
        
        // Автоматически скрываем через 5 секунд
        setTimeout(() => {
            if (toast) {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 300);
            }
        }, 5000);
        
        // Если страница не активна, отправляем браузерное уведомление
        if (!isPageActive && 'Notification' in window && Notification.permission === 'granted') {
            new Notification(title, {
                body: message,
                icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="%233b82f6"/><text x="50" y="70" text-anchor="middle" fill="white" font-size="50">💬</text></svg>'
            });
        }
        
        // Воспроизводим звук
        playNotificationSound();
    }

    // Запрос разрешения на уведомления
    function requestNotificationPermission() {
        if ('Notification' in window && Notification.permission !== 'granted' && Notification.permission !== 'denied') {
            Notification.requestPermission();
        }
    }

    // Отслеживание активности страницы
    document.addEventListener('visibilitychange', () => {
        isPageActive = !document.hidden;
        if (isPageActive) {
            // Когда возвращаемся на страницу, обновляем статус прочтения
            if (activeChatWith) {
                markAsRead(activeChatWith);
            }
        }
    });

    // ========== МОБИЛЬНОЕ МЕНЮ ==========
    function closeSidebar() {
        if (sidebar) sidebar.classList.remove('open');
        if (sidebarOverlay) sidebarOverlay.classList.remove('active');
    }

    function openSidebar() {
        if (sidebar) sidebar.classList.add('open');
        if (sidebarOverlay) sidebarOverlay.classList.add('active');
    }

    if (menuToggle) {
        menuToggle.onclick = () => {
            if (sidebar.classList.contains('open')) {
                closeSidebar();
            } else {
                openSidebar();
            }
        };
    }

    if (sidebarOverlay) {
        sidebarOverlay.onclick = closeSidebar;
    }

    function encodeForFirebase(str) {
        return str.replace(/[.#$[\]/]/g, '_').replace(/ /g, '_');
    }

    function validateLogin(login) {
        if (!login || login.trim() === '') throw new Error('Логин не может быть пустым');
        const regex = /^[a-zA-Z0-9_]+$/;
        if (!regex.test(login)) throw new Error('Логин может содержать только латинские буквы, цифры и нижнее подчёркивание');
        if (login.length < 3) throw new Error('Логин должен быть не менее 3 символов');
        return login.trim();
    }

    function validatePassword(password) {
        if (!password || password.trim() === '') throw new Error('Пароль не может быть пустым');
        if (password.length < 4) throw new Error('Пароль должен быть не менее 4 символов');
        return password;
    }

    function hashPassword(password) {
        let hash = 0;
        for (let i = 0; i < password.length; i++) {
            const char = password.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
        }
        return hash.toString(36) + '_' + password.length;
    }

    // ========== ОНЛАЙН СТАТУС ==========
    async function updateOnlineStatus(isOnline) {
        if (!currentUser) return;
        const safeLogin = encodeForFirebase(currentUser.login);
        await db.ref(`online/${safeLogin}`).set({
            status: isOnline,
            lastSeen: Date.now(),
            name: currentUser.name
        });
    }

    async function getUserOnlineStatus(login) {
        const safeLogin = encodeForFirebase(login);
        const snapshot = await db.ref(`online/${safeLogin}`).once('value');
        const data = snapshot.val();
        if (!data) return false;
        if (data.status && (Date.now() - (data.lastSeen || 0) < 15000)) {
            return true;
        }
        return false;
    }

    function startOnlineHeartbeat() {
        if (onlineStatusInterval) clearInterval(onlineStatusInterval);
        updateOnlineStatus(true);
        onlineStatusInterval = setInterval(() => {
            if (currentUser) {
                updateOnlineStatus(true);
            }
        }, 5000);
        
        window.addEventListener('beforeunload', () => {
            if (currentUser) {
                updateOnlineStatus(false);
            }
        });
    }

    function stopOnlineHeartbeat() {
        if (onlineStatusInterval) {
            clearInterval(onlineStatusInterval);
            onlineStatusInterval = null;
        }
        if (currentUser) {
            updateOnlineStatus(false);
        }
    }

    // ========== ОТМЕТКИ О ПРОЧТЕНИИ ==========
    async function markMessageAsRead(messageId, fromUser, toUser) {
        if (toUser !== currentUser.login) return;
        const chatId = [encodeForFirebase(fromUser), encodeForFirebase(toUser)].sort().join('_');
        await db.ref(`messages/${chatId}/${messageId}/read`).set(true);
        await db.ref(`messages/${chatId}/${messageId}/readAt`).set(Date.now());
    }

    async function markAllMessagesAsRead(withUser) {
        const chatId = [encodeForFirebase(currentUser.login), encodeForFirebase(withUser)].sort().join('_');
        const snapshot = await db.ref(`messages/${chatId}`).once('value');
        const messages = snapshot.val() || {};
        
        const updates = {};
        for (const [msgId, msg] of Object.entries(messages)) {
            if (msg.to === currentUser.login && !msg.read && !msg.deleted) {
                updates[`${msgId}/read`] = true;
                updates[`${msgId}/readAt`] = Date.now();
            }
        }
        
        if (Object.keys(updates).length > 0) {
            await db.ref(`messages/${chatId}`).update(updates);
        }
    }

    // ========== РАБОТА С ПОЛЬЗОВАТЕЛЯМИ ==========
    async function getAllUsers() {
        const snapshot = await db.ref('users').once('value');
        return Object.values(snapshot.val() || {});
    }

    async function findUserByLogin(login) {
        const safeLogin = encodeForFirebase(login);
        const snapshot = await db.ref(`users/${safeLogin}`).once('value');
        return snapshot.val();
    }

    async function saveUser(login, name, password) {
        const safeLogin = encodeForFirebase(login);
        await db.ref(`users/${safeLogin}`).set({
            login, safeLogin, name,
            passwordHash: hashPassword(password),
            createdAt: Date.now()
        });
    }

    async function verifyUser(login, password) {
        const user = await findUserByLogin(login);
        if (!user) throw new Error('Пользователь не найден');
        if (user.passwordHash !== hashPassword(password)) throw new Error('Неверный пароль');
        return user;
    }

    function subscribeToMessages(user1, user2, callback) {
        const chatId = [encodeForFirebase(user1), encodeForFirebase(user2)].sort().join('_');
        const messagesRef = db.ref(`messages/${chatId}`);
        messagesRef.on('value', async (snapshot) => {
            const data = snapshot.val();
            const messages = data ? Object.values(data).sort((a,b) => a.timestamp - b.timestamp) : [];
            
            // Проверяем новые сообщения для уведомлений
            if (messages.length > lastMessageCount && lastMessageCount > 0) {
                const newMessages = messages.slice(lastMessageCount);
                for (const msg of newMessages) {
                    if (msg.to === currentUser?.login && !msg.read && !msg.deleted && msg.from !== currentUser?.login) {
                        // Показываем уведомление
                        const senderName = msg.from;
                        showNotification(`📩 Новое сообщение от ${senderName}`, msg.text.substring(0, 50), msg.from);
                    }
                }
            }
            lastMessageCount = messages.length;
            
            for (const msg of messages) {
                if (msg.to === currentUser?.login && !msg.read && !msg.deleted) {
                    await markMessageAsRead(msg.id, msg.from, msg.to);
                }
            }
            
            callback(messages);
        });
        return () => messagesRef.off();
    }

    async function sendMessage(toLogin, text) {
        if(!text.trim()) return;
        const chatId = [encodeForFirebase(currentUser.login), encodeForFirebase(toLogin)].sort().join('_');
        const newMsg = {
            id: Date.now() + '_' + Math.random().toString(36).substr(2, 9),
            from: currentUser.login,
            to: toLogin,
            text: text.trim(),
            timestamp: Date.now(),
            edited: false,
            deleted: false,
            read: false
        };
        await db.ref(`messages/${chatId}/${newMsg.id}`).set(newMsg);
        
        const lastText = text.trim().substring(0, 50);
        const safeCurrent = encodeForFirebase(currentUser.login);
        const safeTarget = encodeForFirebase(toLogin);
        await db.ref(`lastMessages/${safeCurrent}/${safeTarget}`).set({ lastText, timestamp: Date.now(), withUser: toLogin });
        await db.ref(`lastMessages/${safeTarget}/${safeCurrent}`).set({ lastText, timestamp: Date.now(), withUser: currentUser.login });
        
        const unread = await db.ref(`unread/${safeTarget}/${safeCurrent}`).once('value');
        await db.ref(`unread/${safeTarget}/${safeCurrent}`).set((unread.val() || 0) + 1);
    }

    async function deleteMessage(messageId, withUser) {
        const chatId = [encodeForFirebase(currentUser.login), encodeForFirebase(withUser)].sort().join('_');
        await db.ref(`messages/${chatId}/${messageId}/deleted`).set(true);
    }

    async function editMessage(messageId, withUser, newText) {
        if(!newText.trim()) return;
        const chatId = [encodeForFirebase(currentUser.login), encodeForFirebase(withUser)].sort().join('_');
        await db.ref(`messages/${chatId}/${messageId}`).update({
            text: newText.trim(),
            edited: true,
            timestamp: Date.now()
        });
    }

    async function markAsRead(withUser) {
        const safeCurrent = encodeForFirebase(currentUser.login);
        const safeTarget = encodeForFirebase(withUser);
        await db.ref(`unread/${safeCurrent}/${safeTarget}`).set(0);
        await markAllMessagesAsRead(withUser);
    }

    function showEditModal(messageId, currentText, withUser) {
        const modal = document.createElement('div');
        modal.className = 'edit-modal';
        modal.innerHTML = `
            <div class="edit-modal-content">
                <input type="text" id="editInput" value="${escapeHtml(currentText)}" autocomplete="off">
                <div class="edit-modal-buttons">
                    <button class="cancel-btn">Отмена</button>
                    <button class="save-btn">Сохранить</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const input = modal.querySelector('#editInput');
        input.focus();
        input.select();
        
        modal.querySelector('.save-btn').onclick = async () => {
            const newText = input.value.trim();
            if(newText && newText !== currentText) {
                await editMessage(messageId, withUser, newText);
            }
            modal.remove();
        };
        
        modal.querySelector('.cancel-btn').onclick = () => modal.remove();
        modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
    }

    async function renderMessagesArea(messages) {
        if(!activeChatWith) {
            chatArea.innerHTML = `<div class="chat-placeholder">💬 Выберите чат или найдите пользователя</div>`;
            return;
        }
        
        const isPartnerOnline = await getUserOnlineStatus(activeChatWith);
        const onlineIcon = isPartnerOnline ? '<span class="online-indicator online"></span>' : '<span class="online-indicator offline"></span>';
        
        const messagesHtml = messages.filter(msg => !msg.deleted).map(msg => {
            const isOutgoing = msg.from === currentUser.login;
            const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const editedMark = msg.edited ? '<span class="message-edited">(изменено)</span>' : '';
            
            let readStatusHtml = '';
            if (isOutgoing) {
                if (msg.read) {
                    readStatusHtml = '<span class="read-status read">✅ прочитано</span>';
                } else {
                    readStatusHtml = '<span class="read-status sent">✓ отправлено</span>';
                }
            }
            
            return `
                <div class="message ${isOutgoing ? 'outgoing' : 'incoming'}" data-message-id="${msg.id}">
                    <div class="message-text">${escapeHtml(msg.text)}${editedMark}</div>
                    <div class="message-meta">
                        <span>${time}</span>
                        ${readStatusHtml}
                    </div>
                    ${isOutgoing ? `
                        <div class="message-actions">
                            <button class="edit-msg" title="Редактировать">✏️</button>
                            <button class="delete-msg" title="Удалить">🗑️</button>
                        </div>
                    ` : ''}
                </div>
            `;
        }).join('');
        
        const currentInput = document.getElementById('messageInput');
        if (currentInput && isTyping) savedInputText = currentInput.value;
        
        chatArea.innerHTML = `
            <div class="active-chat-header">
                ${onlineIcon} 👤 ${escapeHtml(activeChatWith)} ${isPartnerOnline ? '<span style="font-size:0.65rem; color:#10b981;">● в сети</span>' : '<span style="font-size:0.65rem; color:#64748b;">● не в сети</span>'}
            </div>
            <div class="messages-container" id="messagesContainer">
                ${messagesHtml || '<div style="text-align:center;color:#64748b;padding:30px;">Нет сообщений</div>'}
            </div>
            <div class="message-input-area">
                <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off" value="${escapeHtml(savedInputText)}">
                <button id="sendMsgBtn">➤ Отправить</button>
            </div>
        `;
        
        document.querySelectorAll('.edit-msg').forEach(btn => {
            const msgDiv = btn.closest('.message');
            const msgId = msgDiv?.getAttribute('data-message-id');
            const msg = messages.find(m => m.id === msgId);
            if(msg && msg.from === currentUser.login) {
                btn.onclick = () => showEditModal(msg.id, msg.text, activeChatWith);
            }
        });
        
        document.querySelectorAll('.delete-msg').forEach(btn => {
            const msgDiv = btn.closest('.message');
            const msgId = msgDiv?.getAttribute('data-message-id');
            btn.onclick = async () => {
                if(confirm('Удалить сообщение?')) {
                    await deleteMessage(msgId, activeChatWith);
                }
            };
        });
        
        const msgInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendMsgBtn');
        const container = document.getElementById('messagesContainer');
        if(container) container.scrollTop = container.scrollHeight;
        
        if(msgInput) {
            msgInput.focus();
            const len = msgInput.value.length;
            msgInput.setSelectionRange(len, len);
            msgInput.oninput = (e) => { savedInputText = e.target.value; isTyping = true; };
            msgInput.onblur = () => { isTyping = false; };
            // Enter для отправки сообщения
            msgInput.onkeypress = (e) => {
                if(e.key === 'Enter') {
                    e.preventDefault();
                    if(sendBtn) sendBtn.click();
                }
            };
        }
        
        if(sendBtn) {
            const newSendBtn = sendBtn.cloneNode(true);
            sendBtn.parentNode.replaceChild(newSendBtn, sendBtn);
            newSendBtn.onclick = async () => {
                const input = document.getElementById('messageInput');
                if(input && input.value.trim()) {
                    const textToSend = input.value;
                    input.value = '';
                    savedInputText = '';
                    isTyping = false;
                    await sendMessage(activeChatWith, textToSend);
                    setTimeout(() => {
                        const newContainer = document.getElementById('messagesContainer');
                        if(newContainer) newContainer.scrollTop = newContainer.scrollHeight;
                    }, 50);
                }
            };
        }
    }

    async function renderChatsList() {
        if(!currentUser) return;
        const safeCurrent = encodeForFirebase(currentUser.login);
        const snapshot = await db.ref(`lastMessages/${safeCurrent}`).once('value');
        const chats = snapshot.val() || {};
        const chatsArray = Object.values(chats).sort((a,b) => b.timestamp - a.timestamp);
        
        if(chatsArray.length === 0) {
            chatsListContainer.innerHTML = `<div style="color:#5b6e8c; text-align:center; padding:20px;">Нет диалогов<br>🔍 найдите пользователя</div>`;
            return;
        }
        
        let html = '';
        for(const chat of chatsArray) {
            const partner = chat.withUser;
            const safePartner = encodeForFirebase(partner);
            const unread = await db.ref(`unread/${safeCurrent}/${safePartner}`).once('value');
            const unreadCount = unread.val() || 0;
            const activeClass = activeChatWith === partner ? 'active' : '';
            const isOnline = await getUserOnlineStatus(partner);
            const onlineIcon = isOnline ? '<span class="online-indicator online"></span>' : '<span class="online-indicator offline"></span>';
            
            html += `
                <div class="chat-item ${activeClass}" data-partner="${partner}">
                    <div>
                        <div class="chat-name">
                            ${onlineIcon} ${escapeHtml(partner)}
                        </div>
                        <div style="font-size:0.65rem; color:#94a3b8;">${escapeHtml(chat.lastText || 'Нет сообщений')}</div>
                    </div>
                    ${unreadCount > 0 ? `<div class="chat-badge">${unreadCount}</div>` : ''}
                </div>
            `;
        }
        chatsListContainer.innerHTML = html;
        document.querySelectorAll('.chat-item').forEach(el => {
            el.addEventListener('click', () => {
                openChatWith(el.getAttribute('data-partner'));
                closeSidebar();
            });
        });
    }

    async function openChatWith(partnerLogin) {
        if(unsubscribeMessages) unsubscribeMessages();
        activeChatWith = partnerLogin;
        savedInputText = '';
        isTyping = false;
        await markAsRead(partnerLogin);
        unsubscribeMessages = subscribeToMessages(currentUser.login, partnerLogin, (messages) => {
            currentChatMessages = messages;
            renderMessagesArea(messages);
        });
        renderChatsList();
    }

    async function renderAllContacts() {
        const users = await getAllUsers();
        const filtered = users.filter(u => u.login !== currentUser.login);
        if(filtered.length === 0) {
            allContactsArea.innerHTML = '<div style="color:#94a3b8; text-align:center; padding:10px;">Нет других пользователей</div>';
            return;
        }
        let html = '<div class="contacts-list">';
        for(const contact of filtered) {
            const isOnline = await getUserOnlineStatus(contact.login);
            const onlineIcon = isOnline ? '<span class="online-indicator online"></span>' : '<span class="online-indicator offline"></span>';
            html += `
                <div class="contact-item">
                    <div class="contact-info">
                        ${onlineIcon} <span>👤 ${escapeHtml(contact.name || contact.login)}</span>
                        <div class="contact-login">@${escapeHtml(contact.login)}</div>
                    </div>
                    <button class="start-chat-btn" data-contact="${contact.login}">💬 Написать</button>
                </div>
            `;
        }
        html += '</div>';
        allContactsArea.innerHTML = html;
        document.querySelectorAll('[data-contact]').forEach(btn => {
            btn.addEventListener('click', () => {
                openChatWith(btn.getAttribute('data-contact'));
                allContactsArea.innerHTML = '';
                closeSidebar();
            });
        });
    }

    async function searchUser() {
        const query = searchUsernameInput.value.trim();
        if(!query) return;
        const user = await findUserByLogin(query);
        if(user && user.login !== currentUser.login) {
            const isOnline = await getUserOnlineStatus(user.login);
            const onlineIcon = isOnline ? '<span class="online-indicator online"></span>' : '<span class="online-indicator offline"></span>';
            searchResultArea.innerHTML = `
                <div class="contact-item" style="margin-top:8px;">
                    <div class="contact-info">
                        ${onlineIcon} <span>👤 ${escapeHtml(user.name || user.login)}</span>
                        <div class="contact-login">@${escapeHtml(user.login)}</div>
                    </div>
                    <button class="start-chat-btn" id="searchStartChat">💬 Написать</button>
                </div>
            `;
            document.getElementById('searchStartChat')?.addEventListener('click', () => {
                openChatWith(user.login);
                searchResultArea.innerHTML = '';
                searchUsernameInput.value = '';
                closeSidebar();
            });
        } else {
            searchResultArea.innerHTML = '<div class="contact-item">❌ Пользователь не найден</div>';
            setTimeout(() => searchResultArea.innerHTML = '', 2000);
        }
    }

    async function register(login, name, password) {
        login = validateLogin(login);
        validatePassword(password);
        if(await findUserByLogin(login)) throw new Error('Логин уже занят');
        await saveUser(login, name, password);
        return { login, name };
    }

    async function loginUser(login, password) {
        return await verifyUser(validateLogin(login), validatePassword(password));
    }

    function setCurrentUser(user) {
        currentUser = user;
        currentUsernameDisplay.innerText = user.name + ' (@' + user.login + ')';
        activeChatWith = null;
        savedInputText = '';
        lastMessageCount = 0;
        if(unsubscribeMessages) unsubscribeMessages();
        startOnlineHeartbeat();
        renderChatsList();
        chatArea.innerHTML = `<div class="chat-placeholder">💬 Выберите чат или найдите пользователя</div>`;
    }

    function logout() {
        stopOnlineHeartbeat();
        if(unsubscribeMessages) unsubscribeMessages();
        currentUser = null;
        activeChatWith = null;
        appContainer.style.display = 'none';
        authOverlay.style.display = 'flex';
    }

    authSubmitBtn.onclick = async () => {
        const login = authLoginInput.value.trim();
        const name = authNameInput.value.trim();
        const password = authPasswordInput.value;
        authErrorSpan.innerText = '';
        try {
            if(isLoginMode) {
                setCurrentUser(await loginUser(login, password));
                authOverlay.style.display = 'none';
                appContainer.style.display = 'flex';
            } else {
                if(!name) throw new Error('Укажите имя');
                setCurrentUser(await register(login, name, password));
                authOverlay.style.display = 'none';
                appContainer.style.display = 'flex';
            }
            authPasswordInput.value = '';
            requestNotificationPermission();
            initNotificationSound();
        } catch(err) {
            authErrorSpan.innerText = err.message;
        }
    };

    toLoginBtn.onclick = () => {
        isLoginMode = !isLoginMode;
        if(isLoginMode) {
            authTitle.innerText = '🔐 Вход';
            authSubmitBtn.innerText = 'Войти';
            authNameInput.style.display = 'none';
        } else {
            authTitle.innerText = '📱 Регистрация';
            authSubmitBtn.innerText = 'Зарегистрироваться';
            authNameInput.style.display = 'block';
        }
        authErrorSpan.innerText = '';
        authLoginInput.value = '';
        authNameInput.value = '';
        authPasswordInput.value = '';
    };

    logoutBtn.onclick = logout;
    searchUserBtn.onclick = searchUser;
    allContactsBtn.onclick = () => {
        if(allContactsArea.innerHTML === '') renderAllContacts();
        else allContactsArea.innerHTML = '';
    };

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, (m) => {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    setInterval(() => {
        if(currentUser && activeChatWith) {
            renderMessagesArea(currentChatMessages);
        }
        if(currentUser) {
            renderChatsList();
        }
    }, 3000);

    // Инициализация
    initNotificationSound();
    requestNotificationPermission();
    authOverlay.style.display = 'flex';
    appContainer.style.display = 'none';
</script>
</body>
</html>
