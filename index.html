<body>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCqg05TJinSlbSMN48FXen-r-sBmIfrhWs",
        authDomain: "davids-ba95a.firebaseapp.com",
        databaseURL: "https://davids-ba95a-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "davids-ba95a",
        storageBucket: "davids-ba95a.firebasestorage.app",
        messagingSenderId: "850875832791",
        appId: "1:850875832791:web:8d5b9c14dfc3c7db1b9392",
        measurementId: "G-5S71J263D4"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let activeChatWith = null;
    let currentChatMessages = [];
    let unsubscribeMessages = null;
    let savedInputText = '';
    let onlineStatusInterval = null;
    let isPageActive = true;
    let messageIdsSet = new Set();
    let notificationsEnabled = false;
    let lastNotificationTime = {};
    let unreadCounts = {};

    const authOverlay = document.getElementById('authOverlay');
    const appContainer = document.getElementById('appContainer');
    const authLoginInput = document.getElementById('authLogin');
    const authNameInput = document.getElementById('authName');
    const authPasswordInput = document.getElementById('authPassword');
    const authSubmitBtn = document.getElementById('authSubmitBtn');
    const toLoginBtn = document.getElementById('toLoginBtn');
    const authErrorSpan = document.getElementById('authError');
    const authTitle = document.getElementById('authTitle');
    const rememberMeCheckbox = document.getElementById('rememberMe');
    const currentUsernameDisplay = document.getElementById('currentUsernameDisplay');
    const logoutBtn = document.getElementById('logoutBtn');
    const searchUsernameInput = document.getElementById('searchUsernameInput');
    const searchUserBtn = document.getElementById('searchUserBtn');
    const searchResultArea = document.getElementById('searchResultArea');
    const allContactsBtn = document.getElementById('allContactsBtn');
    const allContactsArea = document.getElementById('allContactsArea');
    const chatsListContainer = document.getElementById('chatsListContainer');
    const chatArea = document.getElementById('chatArea');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const menuToggle = document.getElementById('menuToggle');
    const notificationBell = document.getElementById('notificationBell');

    let isLoginMode = false;

    function closeSidebar() { sidebar?.classList.remove('open'); sidebarOverlay?.classList.remove('active'); }
    function openSidebar() { sidebar?.classList.add('open'); sidebarOverlay?.classList.add('active'); }
    if (menuToggle) menuToggle.onclick = (e) => { e.stopPropagation(); if (sidebar.classList.contains('open')) closeSidebar(); else openSidebar(); };
    if (sidebarOverlay) sidebarOverlay.onclick = closeSidebar;

    function encodeForFirebase(str) { return str.replace(/[.#$[\]/]/g, '_').replace(/ /g, '_'); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    function validateLogin(login) {
        if (!login?.trim()) throw new Error('Логин не может быть пустым');
        if (!/^[a-zA-Z0-9_]+$/.test(login)) throw new Error('Логин может содержать только латинские буквы, цифры и _');
        if (login.length < 3) throw new Error('Логин не менее 3 символов');
        return login.trim();
    }
    function validatePassword(p) { if (!p?.trim()) throw new Error('Пароль не может быть пустым'); if (p.length < 4) throw new Error('Пароль не менее 4 символов'); return p; }
    function hashPassword(p) { let h=0; for(let i=0;i<p.length;i++) h=((h<<5)-h)+p.charCodeAt(i); return (h&h).toString(36)+'_'+p.length; }

    function saveSession(user) { if (rememberMeCheckbox?.checked) localStorage.setItem('david_messenger_user', JSON.stringify({login:user.login,name:user.name})); }
    function loadSession() { try { return JSON.parse(localStorage.getItem('david_messenger_user')); } catch(e){ return null; } }
    function clearSession() { localStorage.removeItem('david_messenger_user'); }

    // Уведомления с постоянным разрешением
    async function requestNotificationPermission() {
        if (!('Notification' in window)) {
            notificationBell.style.opacity = '0.5';
            return false;
        }
        if (Notification.permission === 'granted') {
            notificationsEnabled = true;
            notificationBell.classList.add('active');
            notificationBell.textContent = '🔔✅';
            return true;
        }
        if (Notification.permission !== 'denied') {
            const permission = await Notification.requestPermission();
            notificationsEnabled = permission === 'granted';
            if (notificationsEnabled) {
                notificationBell.classList.add('active');
                notificationBell.textContent = '🔔✅';
                localStorage.setItem('notifications_enabled', 'true');
            } else {
                notificationBell.style.opacity = '0.5';
                notificationBell.textContent = '🔕';
            }
            return notificationsEnabled;
        }
        notificationBell.style.opacity = '0.5';
        notificationBell.textContent = '🔕';
        return false;
    }

    function showNotification(title, message, senderLogin) {
        if (!notificationsEnabled) return;
        if (activeChatWith === senderLogin) return;
        
        const now = Date.now();
        const lastTime = lastNotificationTime[senderLogin] || 0;
        if (now - lastTime < 3000) return;
        lastNotificationTime[senderLogin] = now;
        
        // Toast-уведомление (всегда показывается)
        const toast = document.createElement('div');
        toast.className = 'notification-toast';
        toast.innerHTML = `<strong>${escapeHtml(title)}</strong><br>${escapeHtml(message.substring(0, 60))}`;
        toast.onclick = () => {
            openChatWith(senderLogin);
            closeSidebar();
            toast.remove();
        };
        document.body.appendChild(toast);
        setTimeout(() => toast?.remove(), 5000);
        
        // Push-уведомление (даже если страница закрыта или телефон заблокирован)
        if (Notification.permission === 'granted') {
            const notification = new Notification(title, { 
                body: message.substring(0, 100), 
                icon: 'https://img.icons8.com/color/48/chat.png',
                badge: 'https://img.icons8.com/color/48/chat.png',
                vibrate: [200, 100, 200],
                silent: false,
                requireInteraction: true
            });
            notification.onclick = () => {
                window.focus();
                openChatWith(senderLogin);
                notification.close();
            };
            setTimeout(() => notification.close(), 10000);
        }
        
        // Короткий звук (только если страница не активна или в фоне)
        if (!isPageActive) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = 880;
                gain.gain.value = 0.15;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
                osc.stop(audioCtx.currentTime + 0.3);
                setTimeout(() => audioCtx.close(), 400);
            } catch(e) {}
        }
    }

    function updatePageTitle() {
        let totalUnread = 0;
        for (const key in unreadCounts) {
            totalUnread += unreadCounts[key] || 0;
        }
        if (totalUnread > 0) {
            document.title = `(${totalUnread}) Давид мессенджер 1580`;
        } else {
            document.title = 'Давид мессенджер 1580';
        }
    }

    async function updateOnlineStatus(isOnline) { if (!currentUser) return; await db.ref(`online/${encodeForFirebase(currentUser.login)}`).set({ status: isOnline, lastSeen: Date.now(), name: currentUser.name }); }
    async function getUserOnlineStatus(login) { const data = (await db.ref(`online/${encodeForFirebase(login)}`).once('value')).val(); return data?.status && (Date.now() - (data.lastSeen||0) < 15000); }
    function startOnlineHeartbeat() { if (onlineStatusInterval) clearInterval(onlineStatusInterval); updateOnlineStatus(true); onlineStatusInterval = setInterval(() => { if(currentUser) updateOnlineStatus(true); }, 5000); }
    function stopOnlineHeartbeat() { if (onlineStatusInterval) clearInterval(onlineStatusInterval); if(currentUser) updateOnlineStatus(false); }

    async function markMessageAsRead(messageId, fromUser, toUser) { if (toUser !== currentUser.login) return; const chatId = [encodeForFirebase(fromUser), encodeForFirebase(toUser)].sort().join('_'); await db.ref(`messages/${chatId}/${messageId}/read`).set(true); }
    async function markAllMessagesAsRead(withUser) { 
        const chatId = [encodeForFirebase(currentUser.login), encodeForFirebase(withUser)].sort().join('_'); 
        const messages = (await db.ref(`messages/${chatId}`).once('value')).val() || {}; 
        const updates = {}; 
        for (const [id, msg] of Object.entries(messages)) 
            if (msg.to === currentUser.login && !msg.read && !msg.deleted) updates[`${id}/read`] = true; 
        if (Object.keys(updates).length) await db.ref(`messages/${chatId}`).update(updates); 
    }
    
    async function markAsRead(withUser) { 
        await db.ref(`unread/${encodeForFirebase(currentUser.login)}/${encodeForFirebase(withUser)}`).set(0);
        unreadCounts[withUser] = 0;
        await markAllMessagesAsRead(withUser);
        updatePageTitle();
        renderChatsList();
    }
    
    async function updateUnreadCount(partnerLogin, increment = true) {
        const safeCurrent = encodeForFirebase(currentUser.login);
        const safePartner = encodeForFirebase(partnerLogin);
        const currentUnread = (await db.ref(`unread/${safeCurrent}/${safePartner}`).once('value')).val() || 0;
        let newCount = increment ? currentUnread + 1 : Math.max(0, currentUnread - 1);
        await db.ref(`unread/${safeCurrent}/${safePartner}`).set(newCount);
        unreadCounts[partnerLogin] = newCount;
        updatePageTitle();
        renderChatsList();
    }
    
    async function sendMessage(toLogin, text) {
        if(!text.trim()) return; 
        const chatId = [encodeForFirebase(currentUser.login), encodeForFirebase(toLogin)].sort().join('_'); 
        const newMsg = { 
            id: Date.now()+'_'+Math.random().toString(36).substr(2,9), 
            from: currentUser.login, 
            to: toLogin, 
            text: text.trim(), 
            timestamp: Date.now(), 
            edited: false, 
            deleted: false, 
            read: false 
        }; 
        await db.ref(`messages/${chatId}/${newMsg.id}`).set(newMsg); 
        const lastText = text.trim().substring(0,50); 
        const safeC=encodeForFirebase(currentUser.login), safeT=encodeForFirebase(toLogin); 
        await db.ref(`lastMessages/${safeC}/${safeT}`).set({ lastText, timestamp: Date.now(), withUser: toLogin }); 
        await db.ref(`lastMessages/${safeT}/${safeC}`).set({ lastText, timestamp: Date.now(), withUser: currentUser.login }); 
        await updateUnreadCount(toLogin, true);
    }
    
    async function deleteMessage(messageId, withUser) { const chatId = [encodeForFirebase(currentUser.login), encodeForFirebase(withUser)].sort().join('_'); await db.ref(`messages/${chatId}/${messageId}/deleted`).set(true); }
    async function editMessage(messageId, withUser, newText) { if(!newText.trim()) return; const chatId = [encodeForFirebase(currentUser.login), encodeForFirebase(withUser)].sort().join('_'); await db.ref(`messages/${chatId}/${messageId}`).update({ text: newText.trim(), edited: true, timestamp: Date.now() }); }
    
    function showEditModal(messageId, currentText, withUser) { 
        const modal = document.createElement('div'); 
        modal.className = 'edit-modal'; 
        modal.innerHTML = `<div class="edit-modal-content"><input type="text" id="editInput" value="${escapeHtml(currentText)}"><div class="edit-modal-buttons"><button class="cancel-btn">Отмена</button><button class="save-btn">Сохранить</button></div></div>`; 
        document.body.appendChild(modal); 
        const input = modal.querySelector('#editInput'); 
        input.focus(); 
        input.select(); 
        modal.querySelector('.save-btn').onclick = async () => { 
            const newText = input.value.trim(); 
            if(newText && newText !== currentText) await editMessage(messageId, withUser, newText); 
            modal.remove(); 
        }; 
        modal.querySelector('.cancel-btn').onclick = () => modal.remove(); 
        modal.onclick = (e) => { if(e.target === modal) modal.remove(); }; 
    }

    function addMessageToDOM(msg) {
        const container = document.getElementById('messagesContainer');
        if (!container) return;
        if (messageIdsSet.has(msg.id)) return;
        messageIdsSet.add(msg.id);
        
        const isOutgoing = msg.from === currentUser.login;
        const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        const editedMark = msg.edited ? '<span class="message-edited">(изменено)</span>' : '';
        const readStatusHtml = isOutgoing ? (msg.read ? '<span class="read-status read">✓✓ прочитано</span>' : '<span class="read-status sent">✓ отправлено</span>') : '';
        
        const div = document.createElement('div');
        div.className = `message ${isOutgoing ? 'outgoing' : 'incoming'}`;
        div.setAttribute('data-message-id', msg.id);
        div.innerHTML = `<div class="message-text">${escapeHtml(msg.text)}${editedMark}</div><div class="message-meta"><span>${time}</span>${readStatusHtml}</div>${isOutgoing ? `<div class="message-actions"><button class="edit-msg">✏️</button><button class="delete-msg">🗑️</button></div>` : ''}`;
        container.appendChild(div);
        
        if (isOutgoing) {
            div.querySelector('.edit-msg').onclick = () => showEditModal(msg.id, msg.text, activeChatWith);
            div.querySelector('.delete-msg').onclick = async () => { if(confirm('Удалить?')) await deleteMessage(msg.id, activeChatWith); };
        }
        setTimeout(() => container.scrollTop = container.scrollHeight, 50);
    }

    async function initChatArea(messages) {
        const isPartnerOnline = await getUserOnlineStatus(activeChatWith);
        const onlineIcon = isPartnerOnline ? '<span class="online-indicator online"></span>' : '<span class="online-indicator offline"></span>';
        
        const messagesHtml = messages.filter(m => !m.deleted).map(msg => {
            const isOutgoing = msg.from === currentUser.login;
            const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const editedMark = msg.edited ? '<span class="message-edited">(изменено)</span>' : '';
            const readStatusHtml = isOutgoing ? (msg.read ? '<span class="read-status read">✓✓ прочитано</span>' : '<span class="read-status sent">✓ отправлено</span>') : '';
            return `<div class="message ${isOutgoing ? 'outgoing' : 'incoming'}" data-message-id="${msg.id}"><div class="message-text">${escapeHtml(msg.text)}${editedMark}</div><div class="message-meta"><span>${time}</span>${readStatusHtml}</div>${isOutgoing ? `<div class="message-actions"><button class="edit-msg">✏️</button><button class="delete-msg">🗑️</button></div>` : ''}</div>`;
        }).join('');
        
        const currentInputText = document.getElementById('messageInput')?.value || savedInputText;
        chatArea.innerHTML = `
            <div class="active-chat-header" id="activeChatHeader">${onlineIcon} 👤 ${escapeHtml(activeChatWith)} ${isPartnerOnline ? '<span style="font-size:0.65rem; color:#10b981;">● в сети</span>' : '<span style="font-size:0.65rem; color:#64748b;">● не в сети</span>'}</div>
            <div class="messages-container" id="messagesContainer">${messagesHtml || '<div style="text-align:center;color:#64748b;padding:30px;">Нет сообщений</div>'}</div>
            <div class="message-input-area"><input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off" value="${escapeHtml(currentInputText)}"><button id="sendMsgBtn">➤ Отправить</button></div>
        `;
        
        messageIdsSet.clear();
        messages.forEach(m => { if(!m.deleted) messageIdsSet.add(m.id); });
        
        document.querySelectorAll('.edit-msg').forEach(btn => {
            const msgDiv = btn.closest('.message');
            const msgId = msgDiv?.getAttribute('data-message-id');
            const msg = messages.find(m => m.id === msgId);
            if(msg?.from === currentUser.login) btn.onclick = () => showEditModal(msg.id, msg.text, activeChatWith);
        });
        document.querySelectorAll('.delete-msg').forEach(btn => {
            const msgDiv = btn.closest('.message');
            const msgId = msgDiv?.getAttribute('data-message-id');
            btn.onclick = async () => { if(confirm('Удалить?')) await deleteMessage(msgId, activeChatWith); };
        });
        
        const msgInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendMsgBtn');
        if(msgInput) {
            msgInput.focus();
            const len = msgInput.value.length;
            msgInput.setSelectionRange(len, len);
            msgInput.oninput = (e) => { savedInputText = e.target.value; };
            msgInput.onkeypress = (e) => { if(e.key === 'Enter') { e.preventDefault(); document.getElementById('sendMsgBtn')?.click(); } };
        }
        if(sendBtn) {
            sendBtn.onclick = async () => {
                const input = document.getElementById('messageInput');
                if(input?.value.trim()) {
                    const textToSend = input.value;
                    input.value = '';
                    savedInputText = '';
                    await sendMessage(activeChatWith, textToSend);
                }
            };
        }
    }

    function onMessagesUpdate(messages) {
        if (!activeChatWith) return;
        const container = document.getElementById('messagesContainer');
        if (!container) {
            initChatArea(messages);
            return;
        }
        const existingIds = new Set();
        document.querySelectorAll('.message[data-message-id]').forEach(el => existingIds.add(el.getAttribute('data-message-id')));
        
        for (const msg of messages.filter(m => !m.deleted)) {
            if (!existingIds.has(msg.id)) {
                addMessageToDOM(msg);
                if (msg.to === currentUser.login && !msg.read && msg.from !== currentUser.login) {
                    const senderName = msg.from;
                    showNotification(`📩 Новое сообщение от ${senderName}`, msg.text.substring(0, 60), senderName);
                }
            } else {
                const el = document.querySelector(`.message[data-message-id="${msg.id}"]`);
                if (el && msg.from === currentUser.login) {
                    const readSpan = el.querySelector('.read-status');
                    if (readSpan && msg.read) {
                        readSpan.className = 'read-status read';
                        readSpan.innerHTML = '✓✓ прочитано';
                    }
                }
            }
        }
        document.querySelectorAll('.message[data-message-id]').forEach(el => {
            const id = el.getAttribute('data-message-id');
            const msg = messages.find(m => m.id === id);
            if (!msg || msg.deleted) el.remove();
        });
    }

    function subscribeToMessages(user1, user2, callback) {
        const chatId = [encodeForFirebase(user1), encodeForFirebase(user2)].sort().join('_');
        const messagesRef = db.ref(`messages/${chatId}`);
        messagesRef.on('value', async (snapshot) => {
            const data = snapshot.val();
            const messages = data ? Object.values(data).sort((a,b) => a.timestamp - b.timestamp) : [];
            for (const msg of messages) {
                if (msg.to === currentUser?.login && !msg.read && !msg.deleted && msg.from !== currentUser?.login) {
                    await markMessageAsRead(msg.id, msg.from, msg.to);
                }
            }
            callback(messages);
        });
        return () => messagesRef.off();
    }

    async function openChatWith(partnerLogin) {
        if(unsubscribeMessages) unsubscribeMessages();
        activeChatWith = partnerLogin;
        savedInputText = '';
        await markAsRead(partnerLogin);
        unsubscribeMessages = subscribeToMessages(currentUser.login, partnerLogin, (messages) => {
            currentChatMessages = messages;
            onMessagesUpdate(messages);
        });
        renderChatsList();
    }

    async function renderChatsList() {
        if(!currentUser) return;
        const safeCurrent = encodeForFirebase(currentUser.login);
        const chats = (await db.ref(`lastMessages/${safeCurrent}`).once('value')).val() || {};
        const chatsArray = Object.values(chats).sort((a,b) => b.timestamp - a.timestamp);
        if(chatsArray.length === 0) { chatsListContainer.innerHTML = `<div style="color:#5b6e8c;text-align:center;padding:20px;">Нет диалогов<br>🔍 найдите пользователя</div>`; return; }
        let html = '';
        for(const chat of chatsArray) {
            const partner = chat.withUser;
            const unreadCount = (await db.ref(`unread/${safeCurrent}/${encodeForFirebase(partner)}`).once('value')).val() || 0;
            unreadCounts[partner] = unreadCount;
            const activeClass = activeChatWith === partner ? 'active' : '';
            const isOnline = await getUserOnlineStatus(partner);
            const onlineIcon = isOnline ? '<span class="online-indicator online"></span>' : '<span class="online-indicator offline"></span>';
            html += `<div class="chat-item ${activeClass}" data-partner="${partner}"><div><div class="chat-name">${onlineIcon} ${escapeHtml(partner)}</div><div style="font-size:0.65rem;color:#94a3b8;">${escapeHtml(chat.lastText || 'Нет сообщений')}</div></div>${unreadCount > 0 ? `<div class="chat-badge">${unreadCount}</div>` : ''}</div>`;
        }
        chatsListContainer.innerHTML = html;
        document.querySelectorAll('.chat-item').forEach(el => { el.addEventListener('click', () => { openChatWith(el.getAttribute('data-partner')); closeSidebar(); }); });
        updatePageTitle();
    }

    async function getAllUsers() { return Object.values((await db.ref('users').once('value')).val() || {}); }
    async function findUserByLogin(login) { return (await db.ref(`users/${encodeForFirebase(login)}`).once('value')).val(); }
    async function saveUser(login, name, password) { await db.ref(`users/${encodeForFirebase(login)}`).set({ login, safeLogin: encodeForFirebase(login), name, passwordHash: hashPassword(password), createdAt: Date.now() }); }
    async function verifyUser(login, password) { const user = await findUserByLogin(login); if (!user) throw new Error('Пользователь не найден'); if (user.passwordHash !== hashPassword(password)) throw new Error('Неверный пароль'); return user; }
    
    async function renderAllContacts() { 
        const users = await getAllUsers(); 
        const filtered = users.filter(u => u.login !== currentUser.login); 
        if(filtered.length === 0) { allContactsArea.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:10px;">Нет других пользователей</div>'; return; } 
        let html = '<div class="contacts-list">'; 
        for(const c of filtered) { 
            const isOnline = await getUserOnlineStatus(c.login); 
            const onlineIcon = isOnline ? '<span class="online-indicator online"></span>' : '<span class="online-indicator offline"></span>'; 
            html += `<div class="contact-item"><div class="contact-info">${onlineIcon} <span>👤 ${escapeHtml(c.name || c.login)}</span><div class="contact-login">@${escapeHtml(c.login)}</div></div><button class="start-chat-btn" data-contact="${c.login}">💬 Написать</button></div>`; 
        } 
        html += '</div>'; 
        allContactsArea.innerHTML = html; 
        document.querySelectorAll('[data-contact]').forEach(btn => { btn.addEventListener('click', () => { openChatWith(btn.getAttribute('data-contact')); allContactsArea.innerHTML = ''; closeSidebar(); }); }); 
    }
    
    async function searchUser() { 
        const query = searchUsernameInput.value.trim(); 
        if(!query) return; 
        const user = await findUserByLogin(query); 
        if(user && user.login !== currentUser.login) { 
            const isOnline = await getUserOnlineStatus(user.login); 
            const onlineIcon = isOnline ? '<span class="online-indicator online"></span>' : '<span class="online-indicator offline"></span>'; 
            searchResultArea.innerHTML = `<div class="contact-item" style="margin-top:8px;"><div class="contact-info">${onlineIcon} <span>👤 ${escapeHtml(user.name || user.login)}</span><div class="contact-login">@${escapeHtml(user.login)}</div></div><button class="start-chat-btn" id="searchStartChat">💬 Написать</button></div>`; 
            document.getElementById('searchStartChat')?.addEventListener('click', () => { openChatWith(user.login); searchResultArea.innerHTML = ''; searchUsernameInput.value = ''; closeSidebar(); }); 
        } else { 
            searchResultArea.innerHTML = '<div class="contact-item">❌ Пользователь не найден</div>'; 
            setTimeout(() => searchResultArea.innerHTML = '', 2000); 
        } 
    }
    
    async function register(login, name, password) { login = validateLogin(login); validatePassword(password); if(await findUserByLogin(login)) throw new Error('Логин уже занят'); await saveUser(login, name, password); return { login, name }; }
    async function loginUser(login, password) { return await verifyUser(validateLogin(login), validatePassword(password)); }
    
    async function autoLogin() { const saved = loadSession(); if(saved?.login) { const user = await findUserByLogin(saved.login); if(user) { setCurrentUser(user); authOverlay.style.display = 'none'; appContainer.style.display = 'flex'; return true; } } return false; }
    
    function setCurrentUser(user) { 
        currentUser = user; 
        currentUsernameDisplay.innerText = user.name + ' (@' + user.login + ')'; 
        activeChatWith = null; 
        if(unsubscribeMessages) unsubscribeMessages(); 
        startOnlineHeartbeat(); 
        renderChatsList(); 
        chatArea.innerHTML = `<div class="chat-placeholder">💬 Выберите чат или найдите пользователя</div>`; 
        messageIdsSet.clear(); 
    }
    
    function logout() { stopOnlineHeartbeat(); if(unsubscribeMessages) unsubscribeMessages(); currentUser = null; activeChatWith = null; clearSession(); appContainer.style.display = 'none'; authOverlay.style.display = 'flex'; }

    authSubmitBtn.onclick = async () => {
        const login = authLoginInput.value.trim(), name = authNameInput.value.trim(), password = authPasswordInput.value;
        authErrorSpan.innerText = '';
        try {
            if(isLoginMode) { setCurrentUser(await loginUser(login, password)); } else { if(!name) throw new Error('Укажите имя'); setCurrentUser(await register(login, name, password)); }
            saveSession(currentUser);
            authOverlay.style.display = 'none';
            appContainer.style.display = 'flex';
            authPasswordInput.value = '';
            requestNotificationPermission();
        } catch(err) { authErrorSpan.innerText = err.message; }
    };
    
    toLoginBtn.onclick = () => {
        isLoginMode = !isLoginMode;
        if(isLoginMode) { authTitle.innerText = '🔐 Вход'; authSubmitBtn.innerText = 'Войти'; authNameInput.style.display = 'none'; }
        else { authTitle.innerText = '📱 Регистрация'; authSubmitBtn.innerText = 'Зарегистрироваться'; authNameInput.style.display = 'block'; }
        authErrorSpan.innerText = '';
        authLoginInput.value = ''; authNameInput.value = ''; authPasswordInput.value = '';
    };
    
    logoutBtn.onclick = logout;
    searchUserBtn.onclick = searchUser;
    allContactsBtn.onclick = () => { if(allContactsArea.innerHTML === '') renderAllContacts(); else allContactsArea.innerHTML = ''; };
    notificationBell.onclick = () => requestNotificationPermission();

    document.addEventListener('visibilitychange', () => { 
        isPageActive = !document.hidden; 
        if (isPageActive && activeChatWith) markAsRead(activeChatWith); 
    });

    setInterval(async () => {
        if(currentUser && activeChatWith) {
            const isOnline = await getUserOnlineStatus(activeChatWith);
            const header = document.getElementById('activeChatHeader');
            if(header) {
                const onlineIcon = isOnline ? '<span class="online-indicator online"></span>' : '<span class="online-indicator offline"></span>';
                header.innerHTML = `${onlineIcon} 👤 ${escapeHtml(activeChatWith)} ${isOnline ? '<span style="font-size:0.65rem; color:#10b981;">● в сети</span>' : '<span style="font-size:0.65rem; color:#64748b;">● не в сети</span>'}`;
            }
        }
        if(currentUser) renderChatsList();
    }, 5000);

    // Восстанавливаем разрешение уведомлений
    if (localStorage.getItem('notifications_enabled') === 'true') {
        Notification.requestPermission().then(perm => {
            if (perm === 'granted') {
                notificationsEnabled = true;
                notificationBell.classList.add('active');
                notificationBell.textContent = '🔔✅';
            }
        });
    }
    
    requestNotificationPermission();
    autoLogin().then(auto => { if(!auto) { authOverlay.style.display = 'flex'; appContainer.style.display = 'none'; } });
</script>
</body>
</html>
